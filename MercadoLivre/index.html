<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Mercado Livre</title>
  </head>
  <body>
    <header class="header">
      <div class="container">
        <div class="search-container">
          <img
            src="./img/mercado-livre-logo.png"
            alt="Logo Mercado Livre"
            class="logo"
          />
          <input
            type="text"
            placeholder="Buscar produtos, marcas e muito mais..."
            id="searchInput"
            class="search-input"
          />
          <button id="searchBtn" class="search-btn">
            <i class="fa-solid fa-magnifying-glass"></i>
          </button>
        </div>
      </div>
    </header>
    <section class="hero">
      <h1>Ofertas Imperdíveis</h1>
      <p>Encontre os melhores preços e ofertas do Mercado Livre</p>
    </section>

    <main class="main">
      <div class="container">
        <h2 class="section-title">Ofertas do Dia</h2>
        <div class="products-grid" id="productsGrid">
          <!-- Os produtos serão inseridos aqui dinamicamente -->
        </div>
      </div>
    </main>
    <footer class="footer">
      <p>Clone do Mercado Livre - Oficial FGarcia</p>
    </footer>

    <script src="./js/script.js"></script>
  </body>
</html>
